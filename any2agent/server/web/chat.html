<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT}} Agent</title>
<style>
  :root{--ink:#1f2328;--mut:#656d76;--line:#d0d7de;--bg:#fff;--user:#eef3fb;--accent:#0969da}
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo",sans-serif;color:var(--ink);background:var(--bg)}
  header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line)}
  header .nm{font-weight:700}
  .chip{font-size:12px;color:var(--mut);background:#f6f8fa;border:1px solid var(--line);border-radius:10px;padding:3px 9px;cursor:pointer;user-select:none}
  .chip:hover{background:#eef1f4}
  .menu{position:absolute;top:46px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:6px;min-width:200px;display:none;z-index:50}
  .menu.open{display:block}
  .menu .mi{padding:8px 10px;border-radius:7px;font-size:13px;cursor:pointer;display:flex;gap:8px}
  .menu .mi:hover{background:#f6f8fa} .menu .mi.sel{font-weight:700;background:#eef6ff}
  .wrap{max-width:820px;margin:0 auto;padding:18px}
  .turn{margin:16px 0}
  .me{display:flex;justify-content:flex-end}
  .me .b{background:var(--user);border-radius:14px;padding:10px 14px;max-width:80%;white-space:pre-wrap}
  .bot .body{white-space:normal}
  .bot .body ul{margin:6px 0;padding-left:20px}
  .bot .body code{background:#f0f1f3;border-radius:4px;padding:1px 5px;font-size:13px}
  .tool{color:var(--mut);font-size:12.5px;margin:4px 0;font-family:ui-monospace,Menlo,monospace}
  .confirm{border:1px solid #d29922;background:#fff8e6;border-radius:10px;padding:10px 12px;margin:8px 0}
  .confirm button{margin-right:8px;padding:5px 12px;border-radius:7px;border:1px solid var(--line);cursor:pointer}
  .confirm .yes{background:var(--accent);color:#fff;border-color:var(--accent)}
  footer{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 18px}
  .row{max-width:820px;margin:0 auto;display:flex;gap:8px}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;height:44px}
  .send{padding:0 16px;border:0;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer}
</style>
</head>
<body>
<header>
  <span class="nm">{{PROJECT}}</span>
  <span class="chip" id="modelChip" title="모델 변경">model ▾</span>
  <div class="menu" id="modelMenu"></div>
</header>
<div class="wrap" id="col"></div>
<footer><div class="row">
  <textarea id="inp" placeholder="메시지를 입력하세요…"></textarea>
  <button class="send" id="send">➤</button>
</div></footer>
<script>
var MODELS=[], DEFAULT_ID=null, selectedModelId=localStorage.getItem('any2agent_model')||null;
var col=document.getElementById('col'), inp=document.getElementById('inp');
var chip=document.getElementById('modelChip'), menu=document.getElementById('modelMenu');
var history=[];

function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function linkify(h){
  function a(u,t){return '<a href="'+u.replace(/"/g,'%22')+'" target="_blank" rel="noopener">'+t+'</a>';}
  h=h.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`\n]+)`/g,'<code>$1</code>');
  h=h.replace(/\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)/g,function(m,t,u){return a(u,t);});
  h=h.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g,function(m,p,u){return p+a(u,u);});
  return h;
}
function md(t){
  var lines=esc(t||'').split(/\r?\n/),out='',inUl=false;
  for(var i=0;i<lines.length;i++){var l=lines[i];
    var m=l.match(/^\s*[-*]\s+(.*)$/);
    if(m){ if(!inUl){out+='<ul>';inUl=true;} out+='<li>'+linkify(m[1])+'</li>'; }
    else { if(inUl){out+='</ul>';inUl=false;} out+='<div>'+linkify(l)+'</div>'; }
  }
  if(inUl)out+='</ul>'; return out;
}
function chipLabel(){
  var m=MODELS.find(function(x){return x.id===(selectedModelId||DEFAULT_ID);});
  chip.textContent=(m?m.label:'model')+' ▾';
}
function renderMenu(){
  menu.innerHTML='';
  if(!MODELS.length){menu.innerHTML='<div class="mi">사용 가능한 모델 없음 (provider 키 설정 필요)</div>';return;}
  MODELS.forEach(function(m){
    var d=document.createElement('div'); d.className='mi'+(m.id===(selectedModelId||DEFAULT_ID)?' sel':'');
    d.textContent=(m.id===(selectedModelId||DEFAULT_ID)?'✓ ':'  ')+m.label+'  ('+m.model+')';
    d.onclick=function(){selectedModelId=m.id;localStorage.setItem('any2agent_model',m.id);chipLabel();renderMenu();menu.classList.remove('open');};
    menu.appendChild(d);
  });
}
chip.onclick=function(){renderMenu();menu.classList.toggle('open');};

fetch('info').then(function(r){return r.json();}).then(function(d){
  MODELS=d.models||[]; DEFAULT_ID=d.default_model_id; chipLabel();
});

function addMe(t){var d=document.createElement('div');d.className='turn me';d.innerHTML='<div class="b">'+esc(t)+'</div>';col.appendChild(d);scroll();}
function addBot(){var d=document.createElement('div');d.className='turn bot';d.innerHTML='<div class="body"></div>';col.appendChild(d);scroll();return d.querySelector('.body');}
function scroll(){window.scrollTo(0,document.body.scrollHeight);}

function send(){
  var t=inp.value.trim(); if(!t)return; inp.value='';
  addMe(t); history.push({role:'user',content:t});
  var body=addBot(); var acc='';
  var payload={messages:history}; if(selectedModelId)payload.model_id=selectedModelId;
  fetch('chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(resp){
    var reader=resp.body.getReader(), dec=new TextDecoder(), buf='';
    function pump(){return reader.read().then(function(res){
      if(res.done){ if(acc)history.push({role:'assistant',content:acc}); return; }
      buf+=dec.decode(res.value,{stream:true});
      var parts=buf.split('\n\n'); buf=parts.pop();
      parts.forEach(function(p){
        var line=p.split('\n').find(function(x){return x.indexOf('data: ')===0;});
        if(!line)return; var ev; try{ev=JSON.parse(line.slice(6));}catch(e){return;}
        if(ev.type==='delta'){acc+=ev.text; body.innerHTML=md(acc);}
        else if(ev.type==='tool'){var s=document.createElement('div');s.className='tool';s.textContent='🔧 '+ev.name+' '+JSON.stringify(ev.args);col.insertBefore(s,body.parentNode.nextSibling);}
        else if(ev.type==='confirm'){renderConfirm(ev);}
        scroll();
      });
      return pump();
    });}
    return pump();
  });
}
function renderConfirm(ev){
  var d=document.createElement('div');d.className='turn';
  d.innerHTML='<div class="confirm">'+esc(ev.message||('확인: '+ev.name))+'<br><br>'
    +'<button class="yes">실행</button><button class="no">취소</button></div>';
  col.appendChild(d);scroll();
  d.querySelector('.yes').onclick=function(){
    fetch('confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:ev.name,args:ev.args})})
    .then(function(r){return r.json();}).then(function(res){
      d.querySelector('.confirm').innerHTML='✅ 실행됨: '+esc(JSON.stringify(res).slice(0,400));
    });
  };
  d.querySelector('.no').onclick=function(){d.querySelector('.confirm').innerHTML='취소됨.';};
}
document.getElementById('send').onclick=send;
inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
</script>
</body>
</html>
