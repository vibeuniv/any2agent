<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT}} · evals</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --ink:#0f1419; --mut:#5b6470; --line:#e6e8eb; --bg:#fbfcfd; --card:#fff;
    --user:#eef4ff; --accent:#2f6df6; --ok:#16a34a; --bad:#dc2626; --warn:#b45309;
    --ok-soft:rgba(22,163,74,.10); --bad-soft:rgba(220,38,38,.10);
    --g1:#2f6df6; --g2:#7c5cff; --g3:#e0529c;
    --shadow:0 1px 2px rgba(16,20,30,.06),0 8px 24px rgba(16,20,30,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{--ink:#e7eaee;--mut:#9aa3af;--line:#262b33;--bg:#0d1117;--card:#161b22;
          --user:#1b2435;--ok-soft:rgba(22,163,74,.16);--bad-soft:rgba(220,38,38,.16);
          --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);}
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,"Apple SD Gothic Neo",sans-serif;
       color:var(--ink);background:var(--bg)}
  header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--card)}
  .logo{width:30px;height:30px;border-radius:9px;background:conic-gradient(from 200deg,var(--g1),var(--g2),var(--g3),var(--g1));
        display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;box-shadow:var(--shadow)}
  .brand{display:flex;flex-direction:column;line-height:1.15}
  .brand .nm{font-weight:700;font-size:15px}
  .brand .sub{font-size:11.5px;color:var(--mut)}
  .spacer{flex:1}
  a.back{font-size:12.5px;color:var(--accent);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:5px 11px}
  main{max-width:820px;margin:0 auto;padding:26px 20px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px 20px;margin:14px 0}
  h2{font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);margin:0 0 12px}

  /* hero verdict */
  .hero{display:flex;gap:16px;align-items:flex-start;padding:22px 20px}
  .hero.ok{border-left:4px solid var(--ok)} .hero.bad{border-left:4px solid var(--bad)}
  .hero .icon{font-size:30px;line-height:1}
  .hero .verdict{font-size:19px;font-weight:800;margin:0 0 4px}
  .hero .plain{color:var(--mut);font-size:14px;margin:0}

  /* KPI row */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:14px 0}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px}
  .kpi .v{font-size:26px;font-weight:800;line-height:1.2}
  .kpi .v .delta{font-size:13px;font-weight:700;margin-left:6px}
  .kpi .v .delta.up{color:var(--ok)} .kpi .v .delta.down{color:var(--bad)}
  .kpi .l{font-size:12px;color:var(--mut);margin-top:2px}

  /* run-history column chart */
  .chart{display:flex;align-items:flex-end;gap:10px;height:150px;padding:8px 4px 0}
  .col{flex:1;max-width:64px;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;position:relative}
  .col .bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:.12s;cursor:default}
  .col .bar.ok{background:var(--ok)} .col .bar.bad{background:var(--bad)}
  .col:hover .bar{filter:brightness(1.12)}
  .col .mark{font-size:11px;font-weight:800}
  .col .mark.ok{color:var(--ok)} .col .mark.bad{color:var(--bad)}
  .col .when{font-size:10px;color:var(--mut);white-space:nowrap}
  .barwrap{position:relative;width:100%;display:flex;align-items:flex-end}
  .whisk{position:absolute;left:50%;width:2px;transform:translateX(-50%);background:var(--mut);opacity:.55;border-radius:1px}
  .pw{color:var(--warn);font-weight:700}
  .pbar{height:7px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:4px}
  .pbar > span{display:block;height:100%;background:var(--bad)}
  .col .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
            background:var(--ink);color:var(--bg);font-size:11.5px;border-radius:8px;padding:6px 10px;
            white-space:nowrap;z-index:5;box-shadow:var(--shadow)}
  .col:hover .tip{display:block}
  .axis{border-top:1px solid var(--line);margin-top:2px}
  .legend{display:flex;gap:14px;font-size:11.5px;color:var(--mut);margin-top:10px}
  .legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}

  /* failure cards */
  .fail{border:1px solid var(--line);border-left:4px solid var(--bad);border-radius:10px;padding:12px 14px;margin:10px 0;background:var(--bad-soft)}
  .fail .req{font-weight:700;margin:0 0 4px}
  .fail .req q{quotes:"“" "”"}
  .fail .cause{font-size:13.5px;margin:0 0 6px}
  .fail .action{font-size:13px;color:var(--mut);margin:0}
  .fail .action b{color:var(--ink)}

  .lesson{display:flex;gap:10px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .lesson:last-child{border-bottom:0}
  .lesson .n{color:var(--mut);font-size:12px}
  .note{color:var(--mut);font-size:12px;margin-top:10px}
  details{margin-top:12px}
  summary{font-size:12.5px;color:var(--mut);cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px}
  th{color:var(--mut);font-weight:600;text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  td{padding:6px 8px;border-bottom:1px solid var(--line)} tr:last-child td{border-bottom:0}
  .empty{text-align:center;color:var(--mut);padding:60px 0}
  .empty code{background:var(--user);border-radius:6px;padding:2px 8px}

  /* help panel */
  .help summary{font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
  .help summary::before{content:"?";display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:50%;background:var(--user);color:var(--accent);font-weight:800;font-size:12px}
  .help[open] summary{margin-bottom:10px}
  .help h3{font-size:13px;margin:14px 0 4px}
  .help p, .help li{font-size:13px;color:var(--mut);margin:4px 0}
  .help b{color:var(--ink)}
  .help ol,.help ul{padding-left:20px;margin:4px 0}
</style>
</head>
<body>
<header>
  <div class="logo">✦</div>
  <div class="brand"><span class="nm">{{PROJECT}}</span><span class="sub">any2agent · eval console</span></div>
  <div class="spacer"></div>
  <span class="back" id="langChip" style="cursor:pointer;margin-right:8px">한/EN</span>
  <a class="back" href="/" id="backChip">← chat</a>
</header>
<main id="main"><div class="empty">Loading…</div></main>

<script>
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// ── i18n: bilingual EN/KO, auto-detected, toggle persists ──
let LANG = localStorage.getItem('any2agent_lang') || ((navigator.language||'').slice(0,2)==='ko' ? 'ko' : 'en');
const STR = {
en:{back:"← chat", loading:"Loading…",
  notChecked:"This agent hasn’t been checked yet.",
  runToCheck:p=>`Run <code>any2agent eval --project ${p}</code> to test it with real tasks, then refresh.`,
  workingWell:"Working well", needsAttention:"Needs attention",
  latest:(n,t)=>`In the latest check, this agent completed <b>${n} of ${t}</b> test task(s)`,
  someFailed:n=>` — <b>${n} failed</b> (details below).`, lastChecked:a=>` Last checked ${a}.`,
  confidence:(a,b)=>`95% confidence: <b>${a}%–${b}%</b>`, tooFew:"⚠ too few tasks to trust",
  kTasksDone:"tasks completed (vs previous check)", kChecks:"checks recorded",
  kLessons:"lessons guiding the agent now", kSuite:"test tasks in the suite",
  histTitle:"Check history — taller is better · whisker = confidence range",
  legPassed:"✓ passed", legBelow:"✗ below gate", legWhisk:"┃ where the true rate likely sits",
  viewTable:"view as table", thWhen:"when", thDone:"completed", thResult:"result", thFailed:"failed tasks",
  pass:"✓ pass", fail:"✗ fail", tipDone:(t,p)=>`${t} — completed ${p}%`, tipLikely:(a,b)=>` (likely ${a}–${b}%)`,
  tipFailed:f=>` · failed: ${f}`,
  wentWrong:"What went wrong — and what happens next", whenAsked:q=>`When asked: <q>${q}</q>`, taskN:t=>`Task ${t}`,
  next:"Next:", liveTitle:"Live usage — real conversations, not test runs",
  keepsFailing:(t,e,c)=>`⚠ <code>${t}</code> keeps failing in live use (${e} of its last ${c} calls)`,
  confDegraded:p=>`<b>${p}% confident</b> this tool has genuinely degraded (not just bad luck):`,
  liveNext:p=>`<b>Next:</b> the API behind it may have changed — run <code>any2agent eval --project ${p}</code> to re-verify.`,
  thTool:"tool", thCalls:"calls", thFailures:"failures", thSpeed:"avg speed", thLast:"last used",
  recorded:n=>`${n} call(s) recorded. Only tool names and outcomes are logged — never arguments, responses, or user identity.`,
  learned:"What the agent has learned",
  learnedNote:"From past failures, these corrections are whispered to the agent on every conversation — each disappears automatically once its task passes a check.",
  loadFail:"Failed to load /evals.",
  ago:{now:"just now",min:m=>`${m} min ago`,hr:h=>`${h} hr ago`,day:d=>`${d} days ago`}},
ko:{back:"← 채팅", loading:"불러오는 중…",
  notChecked:"이 에이전트는 아직 검증되지 않았습니다.",
  runToCheck:p=>`<code>any2agent eval --project ${p}</code> 로 실제 태스크로 검증한 뒤 새로고침하세요.`,
  workingWell:"양호", needsAttention:"주의 필요",
  latest:(n,t)=>`최근 검증에서 이 에이전트는 테스트 <b>${t}개 중 ${n}개</b>를 완수했습니다`,
  someFailed:n=>` — <b>${n}개 실패</b> (아래 상세).`, lastChecked:a=>` 마지막 검증 ${a}.`,
  confidence:(a,b)=>`95% 신뢰구간: <b>${a}%–${b}%</b>`, tooFew:"⚠ 표본이 적어 신뢰 어려움",
  kTasksDone:"완수율 (직전 대비)", kChecks:"검증 횟수",
  kLessons:"현재 적용 중인 교훈", kSuite:"테스트 태스크 수",
  histTitle:"검증 이력 — 높을수록 좋음 · 수염 = 신뢰 범위",
  legPassed:"✓ 통과", legBelow:"✗ 기준 미달", legWhisk:"┃ 참값이 있을 법한 위치",
  viewTable:"표로 보기", thWhen:"시각", thDone:"완수율", thResult:"결과", thFailed:"실패 태스크",
  pass:"✓ 통과", fail:"✗ 실패", tipDone:(t,p)=>`${t} — 완수율 ${p}%`, tipLikely:(a,b)=>` (실제로는 ${a}–${b}%)`,
  tipFailed:f=>` · 실패: ${f}`,
  wentWrong:"무엇이 잘못됐고 — 다음에 무엇을 하나", whenAsked:q=>`요청: <q>${q}</q>`, taskN:t=>`태스크 ${t}`,
  next:"다음:", liveTitle:"실사용 — 테스트가 아닌 실제 대화",
  keepsFailing:(t,e,c)=>`⚠ <code>${t}</code> 가 실사용에서 계속 실패 중 (최근 ${c}회 중 ${e}회)`,
  confDegraded:p=>`이 도구가 실제로 고장났을 <b>확신 ${p}%</b> (단순 운 아님):`,
  liveNext:p=>`<b>다음:</b> 뒤의 API가 바뀌었을 수 있습니다 — <code>any2agent eval --project ${p}</code> 로 재검증하세요.`,
  thTool:"도구", thCalls:"호출", thFailures:"실패", thSpeed:"평균 속도", thLast:"마지막 사용",
  recorded:n=>`${n}회 호출 기록됨. 도구명과 결과만 기록되며 인자·응답·사용자 신원은 기록하지 않습니다.`,
  learned:"에이전트가 배운 것",
  learnedNote:"과거 실패에서 얻은 이 교정들은 매 대화마다 에이전트에게 주입되며, 해당 태스크가 통과하면 자동으로 사라집니다.",
  loadFail:"/evals 를 불러오지 못했습니다.",
  ago:{now:"방금",min:m=>`${m}분 전`,hr:h=>`${h}시간 전`,day:d=>`${d}일 전`}}
};
let T = STR[LANG];
const fmtTs = ts => new Date(ts * 1000).toLocaleString();
const fmtDay = ts => new Date(ts * 1000).toLocaleDateString(undefined, {month:'numeric', day:'numeric'});
const ago = ts => {
  const m = Math.round((Date.now()/1000 - ts) / 60);
  if (m < 2) return T.ago.now;
  if (m < 60) return T.ago.min(m);
  const h = Math.round(m/60);
  if (h < 48) return T.ago.hr(h);
  return T.ago.day(Math.round(h/24));
};

// failure classes → plain language (what happened + what to do)
const CAUSE_STR = {
en:{wrong_tool:['The agent picked the wrong tool for this request.','Its tool descriptions were updated to steer it right — re-run the check to confirm.'],
  bad_args:['The agent called a tool with inputs the API rejected.','The tool’s parameter schema needs fixing — try `eval --fix`.'],
  tool_error:['The API call itself failed while handling this.','Check that the target API is up and the session is valid, then re-run.'],
  state_mismatch:['The agent said it was done, but the expected result was not found afterwards.','Inspect the tool’s write behavior — the action may not actually apply.'],
  answer_gap:['The final answer didn’t contain what was asked for.','Review the answer against the tool results — it may be ignoring data it fetched.'],
  other:['This failed for an unclassified reason.','See the full report (`eval --json`) for details.']},
ko:{wrong_tool:['에이전트가 이 요청에 잘못된 도구를 골랐습니다.','도구 설명이 교정되었습니다 — 재검증으로 확인하세요.'],
  bad_args:['에이전트가 API가 거부한 입력으로 도구를 호출했습니다.','도구의 파라미터 스키마 수정이 필요합니다 — `eval --fix` 를 시도하세요.'],
  tool_error:['API 호출 자체가 처리 중 실패했습니다.','대상 API가 살아있고 세션이 유효한지 확인 후 재실행하세요.'],
  state_mismatch:['에이전트는 완료했다고 했지만, 기대한 결과를 이후에 찾지 못했습니다.','도구의 쓰기 동작을 점검하세요 — 실제로 반영되지 않을 수 있습니다.'],
  answer_gap:['최종 답변에 요청한 내용이 담기지 않았습니다.','도구 결과와 답변을 대조하세요 — 가져온 데이터를 무시했을 수 있습니다.'],
  other:['분류되지 않은 이유로 실패했습니다.','전체 리포트(`eval --json`)에서 상세를 확인하세요.']}
};
let CAUSE = CAUSE_STR[LANG];

let DATA = null;   // cached /evals so a language toggle re-renders without refetch
document.getElementById('langChip').onclick = () => {
  LANG = (LANG==='ko'?'en':'ko'); localStorage.setItem('any2agent_lang', LANG);
  T = STR[LANG]; CAUSE = CAUSE_STR[LANG]; if (DATA) render(DATA);
};

function render(d){
  document.documentElement.lang = LANG;
  document.getElementById('backChip').textContent = T.back;
  const m = document.getElementById('main');
  if (!d.evaluated){
    // never eval'd, but live telemetry (incl. drift warnings) must still show —
    // the runtime signal is always-on, not gated behind a first eval run
    m.innerHTML = `<div class="empty"><p><b>${T.notChecked}</b></p>
      <p>${T.runToCheck(esc(d.project))}</p></div>`
      + liveUsageCard(d) + HELP();
    return;
  }
  const L = d.latest, ok = L.passed, hist = d.history || [];
  const prompts = d.task_prompts || {};
  const passedN = Math.round((L.rate || 0) * L.rated);
  const prev = hist.length > 1 ? hist[hist.length - 2] : null;
  const delta = prev ? (L.rate - prev.rate) : null;

  // ── hero verdict: one plain sentence anyone can read ──
  let html = `<div class="card hero ${ok?'ok':'bad'}">
    <div class="icon">${ok ? '✅' : '⚠️'}</div>
    <div>
      <p class="verdict">${ok ? T.workingWell : T.needsAttention}</p>
      <p class="plain">${T.latest(passedN, L.rated)}${
        ok ? '.' : T.someFailed((L.failed||[]).length)}${T.lastChecked(ago(L.ts))}</p>
    </div></div>`;

  // ── KPI row ──
  const deltaHtml = delta === null ? '' :
    `<span class="delta ${delta >= 0 ? 'up' : 'down'}">${delta >= 0 ? '▲' : '▼'}${Math.abs(delta*100).toFixed(0)}%</span>`;
  // confidence interval on the headline rate: the number is an estimate, the band is where the truth likely sits
  const ci = L.rate_ci || [0, 1];
  const ciTxt = `<div class="l">${T.confidence(Math.round(ci[0]*100), Math.round(ci[1]*100))}` +
    (L.underpowered ? ` · <span class="pw">${T.tooFew}</span>` : '') + `</div>`;
  html += `<div class="kpis">
    <div class="kpi"><div class="v">${Math.round((L.rate||0)*100)}%${deltaHtml}</div>
      <div class="l">${T.kTasksDone}</div>${ciTxt}</div>
    <div class="kpi"><div class="v">${hist.length}</div><div class="l">${T.kChecks}</div></div>
    <div class="kpi"><div class="v">${(d.lessons||[]).length}</div><div class="l">${T.kLessons}</div></div>
    <div class="kpi"><div class="v">${d.tasks_total}</div><div class="l">${T.kSuite}</div></div>
  </div>`;

  // ── run history: column chart (height = completion, status color + ✓/✗ label) ──
  const PLOT_H = 104; // fixed plot height in px so bar length encodes the value truthfully
  const cols = hist.slice(-12).map(e => {
    const pct = Math.round((e.rate||0)*100);
    const c = e.rate_ci || null;
    // whisker = the confidence interval: how much this bar could really be higher/lower
    const whisker = c ? `<div class="whisk" style="bottom:${Math.round(c[0]*PLOT_H)}px;height:${Math.max(1,Math.round((c[1]-c[0])*PLOT_H))}px"></div>` : '';
    return `<div class="col">
      <div class="tip">${T.tipDone(fmtTs(e.ts), pct)}${c?T.tipLikely(Math.round(c[0]*100),Math.round(c[1]*100)):''}${(e.failed||[]).length ? T.tipFailed(esc(e.failed.join(', '))) : ''}</div>
      <span class="mark ${e.passed?'ok':'bad'}">${e.passed?'✓':'✗'}</span>
      <div class="barwrap" style="height:${PLOT_H}px">
        <div class="bar ${e.passed?'ok':'bad'}" style="height:${Math.max(4, Math.round(pct * PLOT_H / 100))}px"></div>${whisker}</div>
      <span class="when">${fmtDay(e.ts)}</span>
    </div>`;
  }).join('');
  html += `<div class="card"><h2>${T.histTitle}</h2>
    <div class="chart">${cols}</div><div class="axis"></div>
    <div class="legend"><span><span class="sw" style="background:var(--ok)"></span>${T.legPassed}</span>
    <span><span class="sw" style="background:var(--bad)"></span>${T.legBelow}</span>
    <span><span class="sw" style="background:var(--mut)"></span>${T.legWhisk}</span></div>
    <details><summary>${T.viewTable}</summary><table><thead>
      <tr><th>${T.thWhen}</th><th>${T.thDone}</th><th>${T.thResult}</th><th>${T.thFailed}</th></tr></thead><tbody>${
      hist.slice().reverse().map(e =>
        `<tr><td>${fmtTs(e.ts)}</td><td>${Math.round((e.rate||0)*100)}%</td>
         <td>${e.passed?T.pass:T.fail}</td><td>${esc((e.failed||[]).join(', ') || '—')}</td></tr>`).join('')
    }</tbody></table></details></div>`;

  // ── failures: lead with the REQUEST, then plain cause, then the action ──
  const fixes = L.fixes || [];
  if (fixes.length){
    html += `<div class="card"><h2>${T.wentWrong}</h2>` + fixes.map(f => {
      const c = CAUSE[f.class] || CAUSE.other;
      const req = prompts[f.task_id];
      return `<div class="fail">
        ${req ? `<p class="req">${T.whenAsked(esc(req))}</p>` : `<p class="req">${T.taskN(esc(f.task_id))}</p>`}
        <p class="cause">${esc(c[0])}</p>
        <p class="action"><b>${T.next}</b> ${esc(c[1])}</p>
      </div>`;
    }).join('') + `</div>`;
  }

  // ── live usage (runtime telemetry) ──
  html += liveUsageCard(d);

  // ── lessons in plain terms ──
  if ((d.lessons||[]).length){
    html += `<div class="card"><h2>${T.learned}</h2>
      <p class="note" style="margin:0 0 8px">${T.learnedNote}</p>` +
      d.lessons.map((l, i) => `<div class="lesson"><span class="n">${i+1}.</span><span>${esc(l.guidance)}</span></div>`).join('') +
      `</div>`;
  }
  html += HELP();
  m.innerHTML = html;
}

fetch('/evals').then(r => r.json()).then(d => { DATA = d; render(d); })
  .catch(() => { document.getElementById('main').innerHTML = `<div class="empty">${T.loadFail}</div>` + HELP(); });

// live telemetry card — shown whether or not an eval has ever run
function liveUsageCard(d){
  const rt = d.runtime || {calls_total: 0};
  if (!(rt.calls_total > 0)) return '';
  const sus = rt.suspects || [];
  return `<div class="card"><h2>${T.liveTitle}</h2>` +
    sus.map(s => {
      const pd = s.p_degraded != null ? Math.round(s.p_degraded*100) : null;
      return `<div class="fail">
      <p class="req">${T.keepsFailing(esc(s.tool), s.recent_errors, s.recent_calls)}</p>` +
      (pd != null ? `<p class="action">${T.confDegraded(pd)}</p>
        <div class="pbar"><span style="width:${pd}%"></span></div>` : '') +
      `<p class="action">${T.liveNext(esc(d.project))}</p>
    </div>`;}).join('') +
    `<table><thead><tr><th>${T.thTool}</th><th>${T.thCalls}</th><th>${T.thFailures}</th><th>${T.thSpeed}</th><th>${T.thLast}</th></tr></thead><tbody>` +
    (rt.tools || []).map(t =>
      `<tr><td><code>${esc(t.tool)}</code></td><td>${t.calls}</td>
       <td>${t.errors ? t.errors + ' (' + Math.round(t.error_rate*100) + '%)' : '—'}</td>
       <td>${t.avg_ms != null ? t.avg_ms + ' ms' : '—'}</td><td>${ago(t.last_ts)}</td></tr>`).join('') +
    `</tbody></table>
    <p class="note">${T.recorded(rt.calls_total)}</p></div>`;
}
