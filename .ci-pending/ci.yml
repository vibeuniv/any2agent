name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Byte-compile (syntax)
        run: python -m compileall any2agent
      - name: Offline smoke — scan a local OpenAPI into a tool set
        run: |
          python - <<'PY'
          from any2agent.scan import openapi
          tools, meta = openapi.scan("examples/petstore/openapi-min.json")
          assert tools, "no tools scanned"
          names = [t.name for t in tools]
          assert any(t.danger for t in tools), "DELETE should be flagged danger"
          assert any(t.write for t in tools), "POST should be flagged write"
          print(f"OK: {len(tools)} tools, write={sum(t.write for t in tools)}, danger={sum(t.danger for t in tools)}")
          PY
      - name: Offline smoke — connect verify/repair loop fixes a path-param gap
        run: |
          python - <<'PY'
          from any2agent.spec import ToolSet, ToolSpec
          from any2agent import verifier as V
          from any2agent.connect import _repair
          ts = ToolSet("demo", [
              ToolSpec(name="get_item", description="Get an item by id",
                       backing={"method": "GET", "path": "/items/{id}"},
                       parameters={"type": "object", "properties": {}}),
          ])
          routes = [{"method": "GET", "path": "/items/{id}"}]
          rep = V.run_all(ts, routes, None, [], live=False)
          assert not [r for r in rep["reports"] if r["name"] == "accuracy"][0]["passed"]
          _repair(ts, rep, {})
          rep2 = V.run_all(ts, routes, None, [], live=False)
          assert [r for r in rep2["reports"] if r["name"] == "accuracy"][0]["passed"], "repair failed"
          print("OK: repair filled missing path param")
          PY
